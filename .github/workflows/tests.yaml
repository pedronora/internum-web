name: Tests

on: pull_request

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/jod'
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test